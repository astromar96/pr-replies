name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      # The test suite uses only Node built-ins + local modules, so there is
      # nothing to install (the lone devDependency, playwright, is only for the
      # UI preview script).
      - name: Run tests
        run: npm test
      - name: Check version sync (package.json <-> plugin.json)
        run: npm run check:version
      - name: Check agent files in sync (src/agent -> commands + skills)
        run: npm run check:agents
