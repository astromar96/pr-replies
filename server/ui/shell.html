<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>pr-replies</title>
<script>
/* Pre-paint theme bootstrap: apply a saved light/dark choice before first paint
   so there is no flash. An unset choice (or "system") leaves data-theme off, so
   the @media(prefers-color-scheme) fallback in ui.css governs — today's behavior. */
(function () {
  try {
    var t = localStorage.getItem('prr:pref:theme');
    if (t === 'light' || t === 'dark') document.documentElement.setAttribute('data-theme', t);
  } catch (e) { /* private mode / no storage */ }
})();
</script>
<!--STYLES-->
</head>
<body>
<div id="root"><main class="wrap" id="app"><div class="boot">Loading session…</div></main></div>
<!--SCRIPTS-->
</body>
</html>
